name: splatam
channels:
  - nvidia/label/cuda-11.6.0
  - pytorch
  - conda-forge
  - defaults

# This variant keeps the core CUDA/PyTorch stack inside conda.
# Torch-dependent pip packages are left as post-create steps so pip does not
# replace torch 1.12.1 with a newer release.
dependencies:
  - python=3.10
  - cuda-toolkit
  - cudatoolkit=11.6
  - pytorch=1.12.1
  - torchvision=0.13.1
  - torchaudio=0.12.1
  - tqdm=4.65.0
  - pillow
  - faiss-gpu
  - opencv
  - imageio
  - matplotlib
  - kornia
  - natsort
  - pyyaml
  - wandb
  - gxx_linux-64=10
  - pip
  - pip:
    - open3d==0.16.0
    - cyclonedds

# Post-create steps:
#   conda activate splatam
#   pip install --no-deps lpips torchmetrics pytorch-msssim plyfile==0.8.1
#   pip install --no-build-isolation --no-deps ./diff-gaussian-rasterization-w-depth.git
